<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Merge Sort Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Merge Sort Visualizer</h1>

<script src="script.js"></script>
</body>
</html>
